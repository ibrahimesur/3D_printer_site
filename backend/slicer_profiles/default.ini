# ──────────────────────────────────────────────────────────────────
# PrintAgo – Varsayılan PrusaSlicer Profili
# ──────────────────────────────────────────────────────────────────
# Bu dosya, özel yazıcı profili bulunamadığında fallback olarak kullanılır.
# Her yazıcı modeli için ayrı bir .ini dosyası oluşturmanız önerilir.
# Örn: bambulab_p1s.ini, ender3_v3.ini, bambulab_x1c.ini
#
# PrusaSlicer profil oluşturma:
#   1. PrusaSlicer GUI'de yazıcı ayarlarını yapın
#   2. File → Export Config... ile .ini dosyasını dışa aktarın
#   3. Bu dizine yazıcı model adıyla kaydedin
# ──────────────────────────────────────────────────────────────────

# Print Settings
layer_height = 0.2
first_layer_height = 0.25
perimeters = 2
top_solid_layers = 4
bottom_solid_layers = 4
fill_density = 20%
fill_pattern = gyroid
support_material = 0
support_material_auto = 0

# Speed
perimeter_speed = 60
infill_speed = 80
first_layer_speed = 30
travel_speed = 150

# Printer
nozzle_diameter = 0.4
bed_shape = 0x0,220x0,220x220,0x220
max_print_height = 250

# Filament (PLA defaults)
filament_diameter = 1.75
temperature = 210
first_layer_temperature = 215
bed_temperature = 60
first_layer_bed_temperature = 65

# Output
gcode_flavor = marlin
use_relative_e_distances = 1
