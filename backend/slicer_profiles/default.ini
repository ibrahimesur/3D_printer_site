# ──────────────────────────────────────────────────────────────────
# PrintAgo – Varsayılan PrusaSlicer Profili (Bambu Lab A1 uyumlu)
# ──────────────────────────────────────────────────────────────────
# Bu dosya, özel yazıcı profili bulunamadığında fallback olarak kullanılır.
# Her yazıcı modeli için ayrı bir .ini dosyası oluşturmanız önerilir.
# Örn: bambulab_p1s.ini, ender3_v3.ini, bambulab_x1c.ini
#
# PrusaSlicer profil oluşturma:
#   1. PrusaSlicer GUI'de yazıcı ayarlarını yapın
#   2. File → Export Config... ile .ini dosyasını dışa aktarın
#   3. Bu dizine yazıcı model adıyla kaydedin
# ──────────────────────────────────────────────────────────────────

# Print Settings
layer_height = 0.2
first_layer_height = 0.25
perimeters = 2
top_solid_layers = 4
bottom_solid_layers = 4
fill_density = 15%
fill_pattern = gyroid
support_material = 1
support_material_auto = 1
support_material_style = organic

# Speed
perimeter_speed = 60
infill_speed = 80
first_layer_speed = 30
travel_speed = 150

# Printer
nozzle_diameter = 0.4
bed_shape = 0x0,220x0,220x220,0x220
max_print_height = 250

# Filament (PLA defaults)
filament_diameter = 1.75
temperature = 210
first_layer_temperature = 215
bed_temperature = 60
first_layer_bed_temperature = 65

# Output
gcode_flavor = marlin
use_relative_e_distances = 0
layer_gcode = 

# ──────────────────────────────────────────────────────────────────
# Başlangıç G-code (Hazırlık Aşaması)
# ──────────────────────────────────────────────────────────────────
# Sıra: Tabla ısıt → Nozzle ısıt → Home → Auto-level → Prime line
start_gcode = M140 S[first_layer_bed_temperature] ; Tabla ısıtma başlat\nM104 S[first_layer_temperature] ; Nozzle ısıtma başlat\nM190 S[first_layer_bed_temperature] ; Tabla sıcaklığını bekle\nM109 S[first_layer_temperature] ; Nozzle sıcaklığını bekle\nG28 ; Tüm eksenleri home'a götür\nG29 ; Otomatik tabla seviyeleme\nG92 E0 ; Extruder sıfırla\nG1 Z5 F3000 ; Z eksenini kaldır\nG1 X2 Y10 F5000 ; Başlangıç noktasına git\nG1 Z0.28 F1000 ; Z'yi ilk katman yüksekliğine indir\nG1 X2 Y200 E15 F1500 ; Temizleme çizgisi 1\nG1 X2.4 Y200 F5000 ; Yana kaydır\nG1 X2.4 Y10 E30 F1500 ; Temizleme çizgisi 2\nG92 E0 ; Extruder sıfırla\nG1 Z5 F3000 ; Z eksenini kaldır\nG1 E-1 F2700 ; Hafif geri çek (oozing önleme)\nM117 Baski basliyor... ; LCD'ye mesaj yaz

# ──────────────────────────────────────────────────────────────────
# Bitiş G-code (Son İşlemler)
# ──────────────────────────────────────────────────────────────────
# Sıra: Geri çek → Z kaldır → Tabla öne çıkar → Soğut → Motorları kapat
end_gcode = G91 ; Relative konumlama\nG1 E-3 F2700 ; Filamenti geri çek\nG1 Z10 F3000 ; Z eksenini 10mm kaldır\nG90 ; Absolute konumlama\nG1 X5 Y215 F5000 ; Tablayı öne çıkar (baskıyı al)\nM104 S0 ; Nozzle ısıtıcıyı kapat\nM140 S0 ; Tabla ısıtıcıyı kapat\nM107 ; Fanı kapat\nG4 S3 ; 3 saniye bekle\nM84 ; Motorları devre dışı bırak\nM117 Baski tamamlandi! ; LCD'ye mesaj yaz
