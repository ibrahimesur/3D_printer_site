services:
  - type: web
    name: 3d-printer-backend
    env: docker
    region: frankfurt
    plan: free
    rootDir: "backend"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: 3d-printer-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: "https://your-frontend-url-here.vercel.app"
      - key: PYTHON_VERSION
        value: "3.11"
        
databases:
  - name: 3d-printer-db
    region: frankfurt
    plan: free
