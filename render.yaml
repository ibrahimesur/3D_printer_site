services:
  - type: web
    name: 3d-printer-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: 3d-printer-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: "https://your-frontend-url-here.vercel.app"
      - key: PYTHON_VERSION
        value: "3.11"
        
databases:
  - name: 3d-printer-db
    region: frankfurt
    plan: free
